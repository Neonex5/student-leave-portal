# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:studentleave.db}
# Try JDBC_DRIVER first, then DATABASE_DRIVER, then fallback to SQLite
spring.datasource.driver-class-name=${JDBC_DRIVER:${DATABASE_DRIVER:org.sqlite.JDBC}}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
# Try HIBERNATE_DIALECT first, then DATABASE_DIALECT, then fallback to SQLite
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:${DATABASE_DIALECT:org.hibernate.community.dialect.SQLiteDialect}}


# Compatibility for PostgreSQL on Render
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Server port
server.port=8080




