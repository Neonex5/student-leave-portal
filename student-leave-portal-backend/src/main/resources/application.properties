# Database Configuration
# Default to SQLite for local development, use Environment Variable for Render
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:studentleave.db}

# Help Spring detect the driver
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.sqlite.JDBC}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Force the dialect to avoid the "DialectResolutionInfo" error
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.community.dialect.SQLiteDialect}

# Server port
server.port=8080

