# Database Configuration
# Default to SQLite for local development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:studentleave.db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.sqlite.JDBC}
spring.jpa.database-platform=${SPRING_DATASOURCE_DIALECT:org.hibernate.community.dialect.SQLiteDialect}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server port
server.port=8080
